version: "3.7"

services:
  chatatender:
    image: ghcr.io/medeiros-web/chatatender:latest
    networks:
      - minha_rede

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.chatatender.rule=Host(`bot.chatatender.ia.br`)
        - traefik.http.routers.chatatender.entrypoints=websecure
        - traefik.http.routers.chatatender.priority=10
        - traefik.http.routers.chatatender.tls.certresolver=letsencryptresolver
        - traefik.http.routers.chatatender.service=chatatender
        - traefik.http.services.chatatender.loadbalancer.server.port=80
        - traefik.http.services.chatatender.loadbalancer.passHostHeader=1

networks:
  minha_rede:
    external: true
    name: minha_rede
